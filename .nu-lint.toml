# .nu-lint.toml — nu-lint configuration for the wttr.in / open-meteo weather scripts
# Rule levels: "off" | "hint" | "warning" | "error"
# Only rules that differ from the nu-lint defaults are set here.
# Run `nu-lint --help` to see all available rules and their defaults.

# --- Top-level options ---

# Standard 80-col limit; nufmt is already configured to the same value.
max_pipeline_length = 80

# Parse errors in external commands (e.g. http, rm) should not block linting.
skip_external_parse_errors = true

# Prefer ?-syntax throughout (e.g. $rec.field?) rather than get --optional.
explicit_optional_access = false


[rules]

# ── Disabled outright ─────────────────────────────────────────────────────────

# main, build-current, wmo-icon, test-data etc. are intentionally long
# weather-domain functions.  Splitting them would scatter related logic across
# many small helpers with no correctness benefit.
max_function_body_length = "off"

# Builder helpers (build-current, build-hourly, wmo-icon …) take 3-4
# positional params by deliberate design.  Switching to flags would change the
# internal calling convention and add noise throughout both files.
max_positional_params = "off"


# ── Downgraded: warning → hint ────────────────────────────────────────────────

# cache_path / subdir are always constructed from $nu.cache-dir internally —
# they never arrive as raw user input, so path-safety is already guaranteed at
# the construction site.
string_param_as_path = "hint"

# Display functions use -> any because they return different shapes under
# --raw (a plain record/list) vs. normal mode (null, side-effecting via print).
# A precise return type would require two separate functions per view.
missing_output_type = "hint"

# open / rm / mkdir / ls failures on cache paths are tolerable: a stale or
# missing cache simply triggers a fresh network fetch on the next run.
# The critical network path (http-get-with-retry) already has its own
# try/catch with retry logic.
catch_builtin_error_try = "hint"

# Builder functions intentionally both print header lines and return table
# data, with the --raw flag cleanly separating the two paths.  There is no
# actual pipeline pollution because callers always branch on --raw before
# invoking these helpers.
print_and_return_data = "hint"

# The assign-then-return pattern is used deliberately for readability in
# several long pipelines (rows, forecast_table …).  Worth fixing eventually
# but not blocking.
assign_then_return = "hint"

# Using `for` for side-effect-only loops is valid style advice, but the
# `each` calls flagged here (e.g. the debug column printer) are clear enough
# as-is and the fix is purely cosmetic.
each_nothing_to_for_loop = "hint"


# ── Kept at warning (default) — genuine correctness risks ────────────────────

# Dynamic `get` without -o on API response records will crash on missing keys.
# These should be fixed; keeping at warning so they stay prominent in CI.
# unsafe_dynamic_record_access = "warning"  ← already the default


# ── Auto-fixable hygiene hints ────────────────────────────────────────────────
# These all default to "hint" already.  Listed here so the intent is explicit
# and so `just fix` (nufmt + nu-lint --fix) will clean them up automatically.

# contains_to_regex_op        = "hint"  # `str contains x` → `=~ x`
# string_may_be_bare          = "hint"  # remove unnecessary quotes
# record_brace_spacing        = "hint"  # `{ a: 1 }` → `{a: 1}`
# explicit_long_flags         = "hint"  # `-f` → `--force`, `-i` → `--index` …
# not_is_empty_to_is_not_empty = "hint" # `not (… | is-empty)` → `is-not-empty`
# compound_assignment         = "hint"  # `$x = $x + 1` → `$x += 1`
# never_space_split           = "hint"  # `$"($var)"` → `$var` where safe
# closure_pipe_body_spacing   = "hint"  # `{|x| body }` spacing
# omit_list_commas            = "hint"  # `[a, b]` → `[a b]`
# merge_multiline_print       = "hint"  # collapse consecutive print blocks
# add_label_to_error          = "hint"  # add `label` field to error make
# reflow_wide_lists           = "hint"  # long inline lists → multiline
# wrap_wide_records           = "hint"  # long inline records → multiline
# where_closure_drop_parameter = "hint" # `where {|x| …}` → `where {…}`

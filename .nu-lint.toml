# .nu-lint.toml — nu-lint configuration for the wttr.in / open-meteo weather scripts
# Rule levels: "off" | "hint" | "warning" | "error"

# --- Top-level options ---

# Increased to 100 to match nufmt and prevent wrapping wttr URLs or ASCII.
max_pipeline_length = 100

# Parse errors in external commands (e.g. http, rm) should not block linting.
skip_external_parse_errors = true

# Prefer ?-syntax throughout (e.g. $rec.field?) rather than get --optional.
explicit_optional_access = false


[rules]

# ── Disabled outright ─────────────────────────────────────────────────────────

# weather-domain functions are intentionally long.
max_function_body_length = "off"

# Builder helpers use positional params by design.
max_positional_params = "off"

# CRITICAL: Prevents collapsing multi-line print statements into one string.
# Required to keep ASCII icons line-by-line.
merge_multiline_print = "off"

# CRITICAL: Prevents stripping quotes from '°F', 'emoji', and 'text'.
# Ensures special characters and units are handled safely.
string_may_be_bare = "off"

# Stops the linter from flagging spaces in records like { a: 1 }.
record_brace_spacing = "off"

# Stops the massive wall of hints about using =~ instead of 'str contains'.
contains_to_regex_op = "off"


# ── Downgraded: warning → hint ────────────────────────────────────────────────

string_param_as_path = "hint"
missing_output_type = "hint"
catch_builtin_error_try = "hint"
print_and_return_data = "hint"
assign_then_return = "hint"
each_nothing_to_for_loop = "hint"


# ── Kept at warning (default) — genuine correctness risks ────────────────────

# These identify where your script might crash on missing JSON keys.
# You should keep these active to ensure script stability.
unsafe_dynamic_record_access = "warning"


# ── Auto-fixable hygiene hints ────────────────────────────────────────────────
# These remain as hints for safe, non-destructive cleanup.

explicit_long_flags           = "hint"  # `-f` → `--force`
not_is_empty_to_is_not_empty  = "hint"  # `not (… | is-empty)` → `is-not-empty`
compound_assignment           = "hint"  # `$x = $x + 1` → `$x += 1`
never_space_split             = "hint"  # `$"($var)"` → `$var`
closure_pipe_body_spacing     = "hint"  # `{|x| body }` spacing
omit_list_commas              = "hint"  # `[a, b]` → `[a b]`
add_label_to_error            = "hint"  # add `label` field to error make
reflow_wide_lists             = "hint"  # long inline lists → multiline
wrap_wide_records             = "hint"  # long inline records → multiline
where_closure_drop_parameter  = "hint"  # `where {|x| …}` → `where {…}`
